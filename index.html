<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment Directory</title>
  <link rel="stylesheet" href="/shared/site.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <p class="eyebrow">Course Workbench</p>
      <h1>Assignment Directory</h1>
      <p class="sub">Select an assignment to launch it.</p>
    </header>
    <div class="grid" id="grid"></div>
    <p class="status" id="status"></p>
  </div>

  <script>
    fetch('/assignments/manifest.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        const grid = document.getElementById('grid');
        (data.assignments || []).forEach(a => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = a.path;
          card.style.textDecoration = 'none';
          card.style.color = 'inherit';
          card.innerHTML =
            '<h2>' + esc(a.title) + '</h2>' +
            '<p class="meta">' + esc(a.status || '') + '</p>' +
            '<p>' + esc(a.description) + '</p>' +
            '<p class="tags">' + (a.tags || []).map(t => esc(t)).join(' · ') + '</p>';
          grid.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Could not load assignments.';
      });

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }
  </script>
</body>
</html>
